  <text x="32" y="434" font-family="monospace" font-size="10" fill="#2255aa" style="fill:rgb(34, 85, 170);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:10px;font-weight:400;text-anchor:start;dominant-baseline:auto"># Tip: you can also run commands directly</text>
  <text x="32" y="452" font-family="monospace" font-size="10" fill="#00d8ff" style="fill:rgb(0, 216, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:10px;font-weight:400;text-anchor:start;dominant-baseline:auto">$ <tspan fill="#667" style="fill:rgb(102, 102, 119);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:10px;font-weight:400;text-anchor:start;dominant-baseline:auto">docmax merge a.pdf b.pdf -o out.pdf</tspan></text>
  <text x="32" y="468" font-family="monospace" font-size="10" fill="#00d8ff" style="fill:rgb(0, 216, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:10px;font-weight:400;text-anchor:start;dominant-baseline:auto">$ <tspan fill="#667" style="fill:rgb(102, 102, 119);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:10px;font-weight:400;text-anchor:start;dominant-baseline:auto">docmax --help</tspan></text>

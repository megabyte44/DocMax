  <text x="24" y="398" font-family="monospace" font-size="10" fill="#334" style="fill:rgb(51, 51, 68);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:10px;font-weight:400;text-anchor:start;dominant-baseline:auto">Use arrow keys to navigate, Enter to select</text>

